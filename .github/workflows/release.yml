name: release

# Triggered by an annotated tag push (`v*`).
#
# Steps:
#   1. build job  — full quality gate (lint + typecheck + test + audit +
#      build + pack-verify + pack).  Runs with contents:read only and
#      persist-credentials:false so the write-scoped GITHUB_TOKEN is NOT
#      available to pnpm install / build.
#   2. publish job — attests provenance, publishes GitHub Release, and
#      dispatches pd-npm-publish.  Only this job holds write permissions.
#
# Quality gates intentionally excluded:
#   - codegen-check: fetches Python wheels from the self-hosted pd-index-pip
#     registry (unavailable in GitHub-hosted runners).  The committed
#     src/types/generated/ snapshot is what CI typechecks.  Run
#     `make codegen-check` locally before tagging a release.
#
# Consumers install via:
#   @concavetrillion:registry=https://concavetrillion.github.io/pd-index-npm/
#   npm install @concavetrillion/pd-ui

on:
  push:
    tags: ["v*"]

# Default: no permissions.  Each job grants only what it needs.
permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ─── Job 1: build ────────────────────────────────────────────────────────────
  # Minimal permissions.  persist-credentials:false ensures the GITHUB_TOKEN
  # is NOT stored in the git credential helper, so pnpm install and the Vite
  # build cannot read it even if a dependency lifecycle script is compromised.
  build:
    name: build + pack tarball
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: "11"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build library (required by pack.contract.test.ts)
        run: pnpm run build

      - name: Test
        run: pnpm run test

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

      - name: Pack
        run: pnpm pack --pack-destination dist/

      - name: Verify pack contents
        run: |
          TARBALL=$(ls dist/*.tgz)
          echo "Tarball: $TARBALL"
          tar -tzf "$TARBALL" | head -40
          # Ensure essential entry points are present in the packed artifact
          tar -tzf "$TARBALL" | grep -q "dist/index" || { echo "ERROR: dist/index missing from pack"; exit 1; }
          echo "Pack content check passed."

      - name: List built artifacts
        run: ls -la dist/

      - name: Upload tarball artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-tarball
          path: dist/*.tgz
          if-no-files-found: error
          retention-days: 1

  # ─── Job 2: publish ───────────────────────────────────────────────────────────
  # Write-scoped permissions are isolated here.  No install or build steps run
  # under elevated credentials — only attestation, release creation, and the
  # pd-index-npm dispatch.
  publish:
    name: attest + publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download tarball artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-tarball
          path: dist/

      - name: List downloaded artifacts
        run: ls -la dist/

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "dist/*.tgz"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*.tgz
          fail_on_unmatched_files: true

      # Notify ConcaveTrillion/pd-index-npm so it indexes the new version
      # immediately instead of requiring a manual dispatch.
      #
      # Requires repo secret PD_NPM_DISPATCH_TOKEN (fine-grained PAT with
      # Contents: read+write on ConcaveTrillion/pd-index-npm).
      # Non-fatal: the registry can be updated manually via workflow_dispatch.
      - name: Notify pd-index-npm of new release
        env:
          GH_TOKEN: ${{ secrets.PD_NPM_DISPATCH_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::PD_NPM_DISPATCH_TOKEN not set; pd-index-npm will need a manual dispatch"
            exit 0
          fi
          TARBALL_NAME=$(ls dist/*.tgz | xargs basename)
          TARBALL_URL="https://github.com/ConcaveTrillion/pd-ui/releases/download/${TAG}/${TARBALL_NAME}"
          gh api -X POST /repos/ConcaveTrillion/pd-index-npm/dispatches \
            -f event_type=pd-npm-publish \
            -f "client_payload[tarball_url]=${TARBALL_URL}" || \
            echo "::warning::pd-index-npm dispatch failed; publish manually via workflow_dispatch"
