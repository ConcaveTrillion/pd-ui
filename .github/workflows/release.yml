name: release

# Triggered by an annotated tag push (`v*`).
#
# Steps:
#   1. build job  — install deps + build library + pack tarball.
#      Runs with contents:read only and persist-credentials:false so the
#      write-scoped GITHUB_TOKEN is NOT available to pnpm install / build.
#   2. publish job — attests provenance, publishes GitHub Release, and
#      dispatches pd-npm-publish.  Only this job holds write permissions.
#
# Consumers install via:
#   @concavetrillion:registry=https://concavetrillion.github.io/pd-index-npm/
#   npm install @concavetrillion/pd-ui

on:
  push:
    tags: ["v*"]

# Default: no permissions.  Each job grants only what it needs.
permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ─── Job 1: build ────────────────────────────────────────────────────────────
  # Minimal permissions.  persist-credentials:false ensures the GITHUB_TOKEN
  # is NOT stored in the git credential helper, so pnpm install and the Vite
  # build cannot read it even if a dependency lifecycle script is compromised.
  build:
    name: build + pack tarball
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Pack
        run: pnpm pack --pack-destination dist/

      - name: List built artifacts
        run: ls -la dist/

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-tarball
          path: dist/*.tgz
          if-no-files-found: error
          retention-days: 1

  # ─── Job 2: publish ───────────────────────────────────────────────────────────
  # Write-scoped permissions are isolated here.  No install or build steps run
  # under elevated credentials — only attestation, release creation, and the
  # pd-index-npm dispatch.
  publish:
    name: attest + publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download tarball artifact
        uses: actions/download-artifact@v4
        with:
          name: release-tarball
          path: dist/

      - name: List downloaded artifacts
        run: ls -la dist/

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*.tgz"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*.tgz
          fail_on_unmatched_files: true

      # Notify ConcaveTrillion/pd-index-npm so it indexes the new version
      # immediately instead of requiring a manual dispatch.
      #
      # Requires repo secret PD_NPM_DISPATCH_TOKEN (fine-grained PAT with
      # Contents: read+write on ConcaveTrillion/pd-index-npm).
      # Non-fatal: the registry can be updated manually via workflow_dispatch.
      - name: Notify pd-index-npm of new release
        env:
          GH_TOKEN: ${{ secrets.PD_NPM_DISPATCH_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::PD_NPM_DISPATCH_TOKEN not set; pd-index-npm will need a manual dispatch"
            exit 0
          fi
          TARBALL_NAME=$(ls dist/*.tgz | xargs basename)
          TARBALL_URL="https://github.com/ConcaveTrillion/pd-ui/releases/download/${TAG}/${TARBALL_NAME}"
          gh api -X POST /repos/ConcaveTrillion/pd-index-npm/dispatches \
            -f event_type=pd-npm-publish \
            -f "client_payload[tarball_url]=${TARBALL_URL}" || \
            echo "::warning::pd-index-npm dispatch failed; publish manually via workflow_dispatch"
