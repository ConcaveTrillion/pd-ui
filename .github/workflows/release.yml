name: release

# Triggered by an annotated tag push (`v*`).
#
# Steps:
#   1. Install deps + build library (vite build).
#   2. Pack the npm tarball (pnpm pack → dist/*.tgz).
#   3. Attest build provenance via Sigstore.
#   4. Publish a GitHub Release and attach the .tgz as an asset.
#   5. Dispatch pd-npm-publish to ConcaveTrillion/pd-index-npm so the
#      static npm registry picks up the new version immediately.
#
# Consumers install via:
#   @concavetrillion:registry=https://concavetrillion.github.io/pd-index-npm/
#   npm install @concavetrillion/pd-ui

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: build + publish GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Pack
        run: pnpm pack --pack-destination dist/

      - name: List built artifacts
        run: ls -la dist/

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*.tgz"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*.tgz
          fail_on_unmatched_files: true

      # Notify ConcaveTrillion/pd-index-npm so it indexes the new version
      # immediately instead of requiring a manual dispatch.
      #
      # Requires repo secret PD_NPM_DISPATCH_TOKEN (fine-grained PAT with
      # Contents: read+write on ConcaveTrillion/pd-index-npm).
      # Non-fatal: the registry can be updated manually via workflow_dispatch.
      - name: Notify pd-index-npm of new release
        env:
          GH_TOKEN: ${{ secrets.PD_NPM_DISPATCH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::PD_NPM_DISPATCH_TOKEN not set; pd-index-npm will need a manual dispatch"
            exit 0
          fi
          TARBALL_NAME=$(ls dist/*.tgz | xargs basename)
          TARBALL_URL="https://github.com/ConcaveTrillion/pd-ui/releases/download/${{ github.ref_name }}/${TARBALL_NAME}"
          gh api -X POST /repos/ConcaveTrillion/pd-index-npm/dispatches \
            -f event_type=pd-npm-publish \
            -f "client_payload[tarball_url]=${TARBALL_URL}" || \
            echo "::warning::pd-index-npm dispatch failed; publish manually via workflow_dispatch"
